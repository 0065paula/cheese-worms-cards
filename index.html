<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奶酪与蛆虫 · 人物志</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="characters-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg-color: #1a1510; --card-bg: linear-gradient(135deg, #faf6ed 0%, #f4e8d0 50%, #ede4d0 100%); --text-dark: #3d3228; --text-muted: #6b5a4a; }
        body { font-family: 'Noto Serif SC', serif; background: var(--bg-color); color: var(--text-dark); overflow: hidden; touch-action: pan-y; }
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(180deg, rgba(26,21,16,0.95) 0%, rgba(26,21,16,0.8) 100%); backdrop-filter: blur(10px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(139,115,85,0.3); }
        .header-title { font-family: 'Cinzel', serif; font-size: 18px; color: #f4e8d0; letter-spacing: 2px; }
        .header-subtitle { font-size: 11px; color: #8b7355; margin-top: 2px; }
        .header-nav { display: flex; gap: 10px; }
        .nav-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(139,115,85,0.2); border: 1px solid rgba(139,115,85,0.4); color: #f4e8d0; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .container { height: 100vh; padding-top: 70px; position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* Stats Section */
        .list-stats { background: rgba(139,115,85,0.1); border: 1px solid rgba(139,115,85,0.3); border-radius: 12px; padding: 20px; margin: 20px; }
        .list-stats h3 { color: #f4e8d0; font-size: 16px; margin-bottom: 12px; font-family: 'Cinzel', serif; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-item { background: rgba(139,115,85,0.15); padding: 12px 8px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 20px; font-weight: 700; color: #8b7355; font-family: 'Cinzel', serif; }
        .stat-label { font-size: 10px; color: rgba(244,232,208,0.6); margin-top: 4px; }
        
        /* Category Filter */
        .category-filter { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .category-filter::-webkit-scrollbar { display: none; }
        .filter-btn { flex-shrink: 0; padding: 8px 14px; background: rgba(139,115,85,0.2); border: 1px solid rgba(139,115,85,0.4); border-radius: 20px; color: #f4e8d0; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #8b7355; border-color: #8b7355; }
        
        /* Character List */
        .character-list { display: flex; flex-direction: column; gap: 12px; padding: 0 20px 100px; }
        .list-item { background: rgba(250,246,237,0.95); border-radius: 12px; padding: 16px; cursor: pointer; transition: transform 0.2s; }
        .list-item:active { transform: scale(0.98); }
        .list-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .list-item-name { font-size: 18px; font-weight: 600; color: var(--text-dark); }
        .list-item-id { font-family: 'Cinzel', serif; font-size: 11px; color: #8b7355; background: rgba(139,115,85,0.1); padding: 3px 8px; border-radius: 10px; }
        .list-item-role { display: inline-block; background: rgba(139,115,85,0.12); color: #8b7355; font-size: 12px; padding: 4px 12px; border-radius: 12px; margin-top: 6px; }
        .list-item-desc { font-size: 14px; color: var(--text-dark); line-height: 1.6; opacity: 0.9; margin-top: 10px; }
        .list-item-chapter { font-size: 11px; color: #8b7355; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(139,115,85,0.15); }
        
        /* Search Panel */
        .search-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,21,16,0.98); z-index: 200; padding: 80px 20px 20px; transform: translateY(-100%); transition: transform 0.3s ease; overflow-y: auto; }
        .search-panel.open { transform: translateY(0); }
        .search-input { width: 100%; padding: 15px 20px; border: 1px solid rgba(139,115,85,0.4); border-radius: 8px; background: rgba(139,115,85,0.1); color: #f4e8d0; font-size: 16px; font-family: 'Noto Serif SC', serif; margin-bottom: 20px; }
        .search-input::placeholder { color: rgba(244,232,208,0.5); }
        .close-search { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(139,115,85,0.2); border: 1px solid rgba(139,115,85,0.4); color: #f4e8d0; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="header-title">奶酪与蛆虫</div>
            <div class="header-subtitle">人物志 · 74位角色</div>
        </div>
        <div class="header-nav">
            <div class="nav-btn" onclick="toggleSearch()" title="搜索">🔍</div>
        </div>
    </div>
    
    <div class="search-panel" id="searchPanel">
        <div class="close-search" onclick="toggleSearch()">✕</div>
        <input type="text" class="search-input" placeholder="搜索姓名、身份或章节..." id="searchInput" oninput="handleSearch()">
        <div class="character-list" id="searchResults"></div>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="list-stats">
            <h3>📊 人物统计</h3>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-number">8</div><div class="stat-label">核心人物</div></div>
                <div class="stat-item"><div class="stat-number">12</div><div class="stat-label">宗教权威</div></div>
                <div class="stat-item"><div class="stat-number">15</div><div class="stat-label">证人/村民</div></div>
                <div class="stat-item"><div class="stat-number">19</div><div class="stat-label">思想家</div></div>
                <div class="stat-item"><div class="stat-number">12</div><div class="stat-label">圣经人物</div></div>
                <div class="stat-item"><div class="stat-number">8</div><div class="stat-label">学者</div></div>
            </div>
        </div>
        
        <div class="category-filter" id="categoryFilter">
            <div class="filter-btn active" onclick="filterList('all')">全部(74)</div>
            <div class="filter-btn" onclick="filterList('核心')">核心</div>
            <div class="filter-btn" onclick="filterList('宗教权威')">宗教权威</div>
            <div class="filter-btn" onclick="filterList('证人')">证人/村民</div>
            <div class="filter-btn" onclick="filterList('思想家')">思想家</div>
            <div class="filter-btn" onclick="filterList('圣经人物')">圣经人物</div>
            <div class="filter-btn" onclick="filterList('学者')">学者</div>
        </div>
        
        <div class="character-list" id="characterList"></div>
    </div>

    <script>
        const accentColors = { '核心': '#8b7355', '宗教权威': '#5a6b7b', '证人': '#7a6a5a', '思想家': '#7b5a6a', '圣经人物': '#6a7b5a', '学者': '#8f7b6b' };
        let currentFilter = 'all';
        
        function init() { generateList(); }
        
        function generateList(filter = 'all', containerId = 'characterList') {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const filtered = filter === 'all' ? allCharacters : allCharacters.filter(c => c.category === filter);
            
            filtered.forEach(char => {
                const item = document.createElement('div');
                item.className = 'list-item';
                
                const roleHtml = char.role && char.role !== '-' ? `<div class="list-item-role">${char.role}</div>` : '';
                
                item.innerHTML = `
                    <div class="list-item-header">
                        <div class="list-item-name">${char.name}</div>
                        <div class="list-item-id">#${char.id}</div>
                    </div>
                    ${roleHtml}
                    <div class="list-item-desc">${char.desc}</div>
                    <div class="list-item-chapter">📖 ${char.chapter} · ${char.category}</div>`;
                container.appendChild(item);
            });
        }
        
        function filterList(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            generateList(category);
        }
        
        function toggleSearch() {
            const panel = document.getElementById('searchPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                document.getElementById('searchInput').focus();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').innerHTML = '';
            }
        }
        
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('searchResults');
            results.innerHTML = '';
            
            if (query.length < 1) return;
            
            const matches = allCharacters.filter(c => 
                c.name.toLowerCase().includes(query) ||
                c.nameIt.toLowerCase().includes(query) ||
                (c.role && c.role.toLowerCase().includes(query)) ||
                c.desc.toLowerCase().includes(query) ||
                c.chapter.toLowerCase().includes(query) ||
                c.category.includes(query)
            );
            
            if (matches.length === 0) {
                results.innerHTML = '<div style="color: rgba(244,232,208,0.5); text-align: center; padding: 40px;">未找到匹配结果</div>';
                return;
            }
            
            matches.forEach(char => {
                const item = document.createElement('div');
                item.className = 'list-item';
                const roleHtml = char.role && char.role !== '-' ? `<div class="list-item-role">${char.role}</div>` : '';
                item.innerHTML = `
                    <div class="list-item-header">
                        <div class="list-item-name">${char.name}</div>
                        <div class="list-item-id">#${char.id}</div>
                    </div>
                    ${roleHtml}
                    <div class="list-item-desc">${char.desc}</div>
                    <div class="list-item-chapter">📖 ${char.chapter} · ${char.category}</div>`;
                results.appendChild(item);
            });
        }
        
        init();
    </script>
</body>
</html>
